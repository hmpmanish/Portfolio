<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manish Pandey | Portfolio</title>
    <style>
        /* General Styling */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            overflow-x: hidden;
        }
        h1, h2, p {
            text-align: center;
        }
        section {
            padding: 60px 20px;
        }

        /* Landing Page */
        .landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d1d1d, #333);
            animation: gradientMove 8s infinite alternate;
        }
        .landing h1 {
            font-size: 3em;
            animation: fadeIn 3s;
        }
        .landing h2 {
            font-size: 1.5em;
            animation: fadeIn 5s;
        }
        .scroll-indicator {
            margin-top: 20px;
            animation: bounce 2s infinite;
        }

        /* About Me Section */
        .about-me img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
            display: block;
            margin: 0 auto;
            animation: zoomIn 2s ease;
        }
        .about-me p {
            max-width: 600px;
            margin: 20px auto;
            font-size: 1.2em;
            animation: fadeInUp 2s ease;
        }

        /* Connect with Me Section */
        .connect .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .social-icons a img {
            width: 40px;
            height: 40px;
            transition: transform 0.3s ease;
        }
        .social-icons a:hover img {
            transform: scale(1.2);
        }

        /* Contact Section */
        .contact form {
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .contact input, .contact textarea, .contact button {
            padding: 10px;
            font-size: 1em;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
        }
        .contact button {
            background-color: #ff6a00;
            cursor: pointer;
            transition: background 0.3s;
        }
        .contact button:hover {
            background-color: #ff8a33;
        }

        /* Keyframes for animations */
        @keyframes gradientMove {
            0% { background: linear-gradient(135deg, #1d1d1d, #333); }
            100% { background: linear-gradient(135deg, #333, #1d1d1d); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomIn {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <!-- Landing Page -->
    <section class="landing">
        <h1>Hi, I'm Manish Pandey</h1>
        <h2>Based in Lucknow, Uttar Pradesh</h2>
        <p class="scroll-indicator">⬇ Scroll Down ⬇</p>
    </section>

    <!-- About Me Section -->
    <section class="about-me" id="about">
        <h2>About Me</h2>
        <img src="profile.jpg" alt="Manish Pandey Profile Picture">
        <p>Hello! I'm Manish, a passionate web developer with a knack for creating dynamic and engaging digital experiences. Welcome to my portfolio!</p>
    </section>

    <!-- Connect with Me Section -->
    <section class="connect" id="connect">
        <h2>Connect with Me</h2>
        <div class="social-icons">
            <a href="https://linkedin.com/in/hmpmanish" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/linkedin.png" alt="LinkedIn"></a>
            <a href="https://instagram.com/hmpmanish" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png" alt="Instagram"></a>
            <a href="https://twitter.com/hmpmanish" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/twitter.png" alt="Twitter"></a>
            <a href="https://github.com/hmpmanish" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/github.png" alt="GitHub"></a>
        </div>
    </section>

    
        

    <!-- Script to Send Contact Form Data to SheetDB -->
    <script src="https://sheetdb.io/s/f/ygo5rga9xzqdn.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            fetch('https://sheetdb.io/api/v1/ygo5rga9xzqdn', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ data: data })
            })
            .then(response => response.json())
            .then(data => {
                alert("Message sent successfully!");
                e.target.reset();
            })
            .catch(error => {
                alert("There was an error sending the message.");
            });
        });
    </script>

</body>
</html>
